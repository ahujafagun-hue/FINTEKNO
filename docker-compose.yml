services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fintekno
      POSTGRES_PASSWORD: fintekno
      POSTGRES_DB: fintekno
    ports:
      - '5432:5432'
    volumes:
      - fintekno_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fintekno -d fintekno']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fintekno_pgdata:
